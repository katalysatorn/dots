[bar]
bg = "transparent"
button-variant = "basic"

[[bar.layout]]
monitor = "*"
show = true
left = [
    { name = "titlebar", modules = [
    "dashboard",
    "hyprland-workspaces",
] },
    "window-title",
]
center = ["media"]
right = [
    "systray",
    { name = "wireless", modules = [
    "network",
    "bluetooth",
] },
    { name = "audio", modules = [
    "volume",
    "microphone",
] },
    "clock",
    "battery",
]

[styling.palette]
bg = "#11111b"
surface = "#181825"
elevated = "#1e1e2e"
fg = "#cdd6f4"
fg-muted = "#bac2de"
primary = "#b4befe"
red = "#f38ba8"
yellow = "#f9e2af"
green = "#a6e3a1"
blue = "#74c7ec"

[modules.bluetooth]
label-show = false

[modules.clock]
format = "%Y-%m-%d %I:%M %p"
icon-show = false

[modules.dashboard]
icon-color = "status-info"
dropdown-lock-command = "swaylock"

[modules.hyprland-workspaces]
app-icons-show = true

[modules.media]
icon-show = false

[modules.microphone]
label-show = false

[modules.network]
label-show = false

[modules.notification]
popup-close-behavior = "remove"

[modules.volume]
scroll-up = "wayle audio output-volume +5"
scroll-down = "wayle audio output-volume -5"

[modules.window-title]
icon-show = false
icon-bg-color = "auto"
label-color = "auto"
